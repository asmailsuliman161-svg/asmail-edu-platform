<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>منصة الاختبارات</title>
</head>

<body>

<h2>إنشاء حساب</h2>
<input id="email" placeholder="البريد الإلكتروني"><br>
<input id="pass" type="password" placeholder="كلمة المرور"><br>
<button onclick="register()">تسجيل</button>

<h2>تسجيل الدخول</h2>
<button onclick="login()">دخول</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// إعداد Firebase (من بياناتك)
const firebaseConfig = {
  apiKey: "AIzaSyBe_hgG12F-WWIaXl5kmopTp2-IEayFIek",
  authDomain: "ismail-training-and-testing.firebaseapp.com",
  projectId: "ismail-training-and-testing",
  storageBucket: "ismail-training-and-testing.firebasestorage.app",
  messagingSenderId: "160567542944",
  appId: "1:160567542944:web:d510e2a82b225477d4f5c5",
  measurementId: "G-0WF6QZ5Q5Y"
};

// تهيئة Firebase
firebase.initializeApp(firebaseConfig);

// خدمات Firebase
const auth = firebase.auth();
const db = firebase.firestore();

// إنشاء حساب
function register(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  auth.createUserWithEmailAndPassword(email, pass)
  .then(()=> alert("تم إنشاء الحساب بنجاح"))
  .catch(e=> alert(e.message));
}

// تسجيل الدخول
function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  auth.signInWithEmailAndPassword(email, pass)
  .then(()=> alert("تم تسجيل الدخول"))
  .catch(e=> alert(e.message));
}
</script>

</body>
</html>
