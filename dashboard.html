<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة التحكم</title>
</head>
<body>

<h1>مرحباً بك في لوحة التحكم 🎓</h1>

<p id="user"></p>

<button onclick="logout()">تسجيل الخروج</button>

<hr>

<h2>🎮 لعبة الرياضيات</h2>

<p id="question"></p>

<input type="number" id="answer" placeholder="إجابتك"><br><br>

<button onclick="checkAnswer()">تحقق</button>

<p id="result"></p>
<p id="score">النقاط: 0</p>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// حماية الصفحة
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("user").innerText = "المستخدم: " + user.email;
  } else {
    window.location.href = "login.html";
  }
});

// تسجيل الخروج
function logout() {
  auth.signOut().then(() => {
    window.location.href = "login.html";
  });
}

let score = 0;
let num1, num2, correctAnswer;

function newQuestion() {
  num1 = Math.floor(Math.random() * 10);
  num2 = Math.floor(Math.random() * 10);
  correctAnswer = num1 + num2;

  document.getElementById("question").innerText =
    num1 + " + " + num2 + " = ?";
}

function checkAnswer() {
  const userAnswer = parseInt(document.getElementById("answer").value);

  if (userAnswer === correctAnswer) {
    score++;
    document.getElementById("result").innerText = "إجابة صحيحة ✅";
  } else {
    document.getElementById("result").innerText = "إجابة خاطئة ❌";
  }

  document.getElementById("score").innerText = "النقاط: " + score;
  document.getElementById("answer").value = "";

  newQuestion();
}

newQuestion();
</script>

</body>
</html>
