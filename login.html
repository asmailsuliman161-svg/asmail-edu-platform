<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول</title>
</head>
<body>

  <h2>تسجيل الدخول</h2>

  <input type="email" id="email" placeholder="البريد الإلكتروني"><br><br>
  <input type="password" id="password" placeholder="كلمة المرور"><br><br>

  <button onclick="login()">دخول</button>

  <p id="msg"></p>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>

  <script>
    // إعداد Firebase (ضع بيانات مشروعك هنا)
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          document.getElementById("msg").innerText = "تم تسجيل الدخول بنجاح ✅";
          window.location.href = "dashboard.html";
        })
        .catch((error) => {
          document.getElementById("msg").innerText = error.message;
        });
    }
  </script>

</body>
</html>
